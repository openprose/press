name: Press Eval (Full)

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Eval tier: quick (3 cheap), standard (6 default), full (all)"
        required: false
        default: "standard"
      model:
        description: "Override model for all evals"
        required: false
      concurrency:
        description: "Max parallel evals"
        required: false
        default: "3"

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: openprose/prose
          path: prose

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run Press evals
        run: |
          npx tsx src/eval-pipeline.ts \
            --tier ${{ inputs.tier || 'standard' }} \
            --concurrency ${{ inputs.concurrency || '3' }} \
            ${{ inputs.model && format('--model {0}', inputs.model) || '' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        timeout-minutes: 25

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}-${{ inputs.tier || 'standard' }}
          path: eval-results/
          retention-days: 90
